<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wardrobe Analyzer</title>
    <link rel="stylesheet" href="index.css">
    <script defer src="script.js"></script>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>Wardrobe Analyzer</h1>
            <p>Optimize your wardrobe with AI-powered insights</p>
        </div>

        <div class="main-content">
            <!--Left: adds items and stats-->

            <div class="panel">
                <h2>Add new Item</h2>

                <div class="upload-section" id="uploadSection">
                    <div class="upload-icon">📁</div>
                    <p>Drag & Drop your clothing images here or click to upload</p>
                    <input type="file" id="fileInput" class="file-input" multiple accept="image/*">
            </div>

            <form id="clothingForm">
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category">
                        <option value="tops">Tops</option>
                        <option value="bottoms">Bottoms</option>
                        <option value="dresses">Dresses</option>
                        <option value="outerwear">Outerwear</option>
                        <option value="shoes">Shoes</option>
                        <option value="accessories">Accessories</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="color">Color</label>
                    <select id="color">
                        <option value="red">Red</option>
                        <option value="blue">Blue</option>
                        <option value="green">Green</option>
                        <option value="black">Black</option>
                        <option value="white">White</option>
                        <option value="yellow">Yellow</option>
                        <option value="purple">Purple</option>
                        <option value="pink">Pink</option>
                        <option value="brown">Brown</option>
                        <option value="gray">Gray</option>
                        <option value="orange">Orange</option>
                    </select>  
                </div>

                <div class="form-group">
                    <label for="season">Season</label>
                    <select id="season">
                        <option value="spring">Spring</option>
                        <option value="summer">Summer</option>
                        <option value="fall">Fall</option>
                        <option value="winter">Winter</option>
                    </select>
                </div>

                <button type="submit" class="btn">Add Item</button>
            </form>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalItems">0</div>
                    <div>Total Items</div>
                </div>"
                <div class="stat-card">
                    <div class="stat-number" id="recentlyWorn">0</div>
                    <div>Unique Categories</div>
                </div>
            </div>
        </div>


            <!--Center: outfit suggestions and wardrobe-->

            <div class="panel">
                <h2>My Wardrobe</h2>

                <div class="filter">
                    <select class="filter-select" id="categoryFilter">
                        <option value="">All Categories</option>
                        <option value="tops">Tops</option>
                        <option value="bottoms">Bottoms</option>
                        <option value="dresses">Dresses</option>
                        <option value="outerwear">Outerwear</option>
                        <option value="shoes">Shoes</option>
                        <option value="accessories">Accessories</option>
                    </select>

                    <select class="filter-select" id="colorFilter">
                        <option value="">All Colors</option>
                        <option value="red">Red</option>
                        <option value="blue">Blue</option>
                        <option value="green">Green</option>
                        <option value="black">Black</option>
                        <option value="white">White</option>
                        <option value="yellow">Yellow</option>
                        <option value="purple">Purple</option>
                        <option value="pink">Pink</option>
                        <option value="brown">Brown</option>
                        <option value="gray">Gray</option>
                        <option value="orange">Orange</option>
                    </select>

                    <select class="filter-select" id="seasonFilter">
                        <option value="">All Seasons</option>
                        <option value="spring">Spring</option>
                        <option value="summer">Summer</option>
                        <option value="fall">Fall</option>
                        <option value="winter">Winter</option>
                    </select>
                </div>

                <div class="wardrobe-grid" id="wardrobeGrid">
                    <!-- Clothing items will be dynamically added here -->
                </div>     
        </div>

            <!--Right: outfit suggestions and weather widget-->

            <div class="panel">
                <h2>Outfit Suggestions</h2>
                <div class="Weather widget"> <!-- implement weather logic pls-->
                    <h3>Today's Weather</h3>
                    <div id="weather-info" > <!-- eventually make this load immediately but button is okay-->
                        <a href="javascript:displayWeatherSuggestions()">Click Here</a>

                    </div>
                </div>

                <div class="form-group">
                    <label for="occasion">Occasion</label>
                    <select id="occasion">
                        <option value="casual">Casual</option>
                        <option value="formal">Formal</option>
                        <option value="work">Work</option>
                        <option value="party">Party</option>
                        <option value="exercise">Exercise</option>
                        <option value="date">Date</option>
                    </select>
            </div>

            <button onclick="getOutfitSuggestion()" class="btn btn-secondary" id="suggestOutfitBtn">Get Outfit Suggestion</button>

            <div id="outfitSuggestions">
                <!--Outfit suggestions here but I dont wanna do it right now-->
                    
            </div>

            <div style="margin-top: 30px;">
                <h3>Color Coordination Tips</h3>
                <div class="color-palette">
                    <div class="color-swatch" style="background-color: #ff6347;"></div>
                    <div class="color-swatch" style="background-color: #4682b4;"></div>
                    <div class="color-swatch" style="background-color: #32cd32;"></div>
                    <div class="color-swatch" style="background-color: #ffa500;"></div>
                    <div class="color-swatch" style="background-color: #800080;"></div>
            </div>
            <p style="text-align: center; margin-top: 10px; font-size: 0.9rem; color: #666;">
                Try complementary colors!!
            </p>
            </div>
            </div>
        </div>
    </div>

</body>
